<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/here.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/src/style.scss" id="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <title>Here</title>
</head>

<body>
  <div id="app">
    <div id="loading">
      <div class="spinner"></div>
    </div>
    <div id="mapBox">
      <div id="rightBtns"> <button id="userLocation">
          <picture>
            <source srcset="./here.webp" type="image/webp">
            <img src="./here.png" alt="Jag" id="userLocationImg" width="100%" height="100%">
          </picture>
        </button>
        <button id="viewAll">
          <picture>
            <source srcset="./eyeopen.webp" type="image/webp">
            <img src="./eyeopen.png" alt="Jag" id="viewAllImg" width="100%" height="100%">
          </picture>
        </button>
      </div>
      <input id="inputLocation" type="search" placeholder="Sök..." results>
      <div id="map"></div>
      <div id="popup"></div>
    </div>
    <footer>
      <p>Alfons Eriksson Sveiven</p>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
  <script>

    function closePopup() {
      popup.classList.remove('visible');
    }
  </script>
</body>

</html>
